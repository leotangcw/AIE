# AIE CI/CD Pipeline - Optimized for Claude Code Development
# 面向 Claude Code 协作开发的持续集成工作流

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PIP_CACHE_DIR: ~/.cache/pip
  NPM_CACHE_DIR: ~/.npm

jobs:
  # ===========================================
  # Commit 信息检查
  # ===========================================
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: |
          echo "Checking commit messages..."
          git log -1 --pretty=%s | grep -E "^(feat|fix|docs|refactor|test|chore|ci|perf|style|build|revert)(\([a-z-]+\))?: " || (echo "❌ Commit message format error!" && exit 1)

  # ===========================================
  # Python 代码质量检查
  # ===========================================
  python-lint:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check code style with Flake8
        run: |
          echo "🔍 Running flake8..."
          flake8 backend --config=.flake8 --statistics --count

      - name: Check formatting with Black
        run: |
          echo "🔍 Running black --check..."
          black --check backend/

      - name: Check imports with isort
        run: |
          echo "🔍 Running isort --check..."
          isort --check-only backend/

      - name: Type checking with mypy (non-blocking)
        run: |
          echo "🔍 Running mypy..."
          mypy backend/ --ignore-missing-imports --no-strict-optional || echo "⚠️ Type hints need improvement"

  # ===========================================
  # Python 安全扫描
  # ===========================================
  python-security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install safety bandit trufflehog3

      - name: Check dependencies with safety
        run: |
          echo "🔒 Scanning dependencies..."
          safety check -r requirements.txt --short || true

      - name: Run bandit security scan
        run: |
          echo "🔒 Running bandit..."
          bandit -r backend/ -ll -ii --format custom || true

      - name: Scan for secrets with trufflehog
        run: |
          echo "🔒 Scanning for secrets..."
          trufflehog3 filesystem --no-update backend/ || true

  # ===========================================
  # 前端代码质量
  # ===========================================
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint || echo "⚠️ ESLint not configured"

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit || echo "⚠️ Type errors found"

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 3
          if-no-files-found: ignore

  # ===========================================
  # 文档验证
  # ===========================================
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate markdown files
        run: |
          echo "📄 Validating markdown files..."
          for file in docs/*.md docs/**/*.md; do
            if [ -f "$file" ]; then
              echo "  ✓ $file"
            fi
          done

      - name: Check for broken internal links
        run: |
          echo "🔗 Checking internal links..."
          grep -r "\](\./" docs/ --include="*.md" | head -20 || true

  # ===========================================
  # Claude Code 特定检查
  # ===========================================
  claude-code-check:
    name: Claude Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CLAUDE.md exists
        run: |
          if [ -f "CLAUDE.md" ]; then
            echo "✅ CLAUDE.md found"
          else
            echo "⚠️ CLAUDE.md not found"
          fi

      - name: Check for .claude directory
        run: |
          if [ -d ".claude" ]; then
            echo "✅ .claude directory found"
            ls -la .claude/ || true
          else
            echo "⚠️ .claude directory not found"
          fi

      - name: Validate memory directory
        run: |
          if [ -d "memory" ]; then
            echo "✅ memory directory found"
            ls -la memory/ | head -10 || true
          else
            echo "⚠️ memory directory not found"
          fi

  # ===========================================
  # 综合报告
  # ===========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [commit-lint, python-lint, python-security, frontend-quality, docs-validation, claude-code-check]
    if: always()
    steps:
      - name: Generate CI Summary
        run: |
          echo "## 📊 CI Pipeline Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Commit Lint | ${{ needs.commit-lint.result }} |"
          echo "| Python Lint | ${{ needs.python-lint.result }} |"
          echo "| Security Scan | ${{ needs.python-security.result }} |"
          echo "| Frontend Quality | ${{ needs.frontend-quality.result }} |"
          echo "| Docs Validation | ${{ needs.docs-validation.result }} |"
          echo "| Claude Code Check | ${{ needs.claude-code-check.result }} |"
          echo ""

          # Check if all passed
          if [ "${{ needs.commit-lint.result }}" == "success" ] && \
             [ "${{ needs.python-lint.result }}" == "success" ] && \
             [ "${{ needs.frontend-quality.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "⚠️ Some checks failed or were skipped"
          fi
