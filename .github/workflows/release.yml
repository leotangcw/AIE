# AIE Release Pipeline
# 发布工作流：构建、打包、发布

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v0.2.0)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ===========================================
  # 版本验证
  # ===========================================
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ inputs.version }}
            VERSION=${VERSION#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

  # ===========================================
  # 后端打包
  # ===========================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create backend package
        run: |
          mkdir -p dist/backend
          cp -r backend/ dist/backend/
          cp requirements.txt dist/backend/
          cp start_*.py dist/backend/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: aie-backend-${{ needs.validate-version.outputs.version }}
          path: dist/backend/

  # ===========================================
  # 前端构建
  # ===========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: aie-frontend-${{ needs.validate-version.outputs.version }}
          path: frontend/dist/

  # ===========================================
  # Docker 镜像构建
  # ===========================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [validate-version, build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aie:${{ needs.validate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # 创建 Release
  # ===========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-backend, build-frontend]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          zip -r aie-backend-${{ needs.validate-version.outputs.version }}.zip aie-backend-${{ needs.validate-version.outputs.version }}/
          zip -r aie-frontend-${{ needs.validate-version.outputs.version }}.zip aie-frontend-${{ needs.validate-version.outputs.version }}/

      - name: Generate changelog
        run: |
          echo "## 🚀 Changes" > CHANGELOG.md
          git log --oneline --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md 2>/dev/null || echo "- Initial release" >> CHANGELOG.md
          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ needs.validate-version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            aie-backend-${{ needs.validate-version.outputs.version }}.zip
            aie-frontend-${{ needs.validate-version.outputs.version }}.zip
