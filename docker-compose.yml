# AIE Docker Compose - CI/CD 和开发环境
# 一键拉起 CI 环境、开发环境和生产环境

version: '3.8'

services:
  # ===========================================
  # 数据库服务
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: aie-postgres
    profiles:
      - ci
      - dev
      - prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aie}
      POSTGRES_USER: ${POSTGRES_USER:-aie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aie_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aie} -d ${POSTGRES_DB:-aie}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aie-network

  # Redis (用于缓存和消息队列)
  redis:
    image: redis:7-alpine
    container_name: aie-redis
    profiles:
      - ci
      - dev
      - prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aie-network

  # ===========================================
  # 后端服务
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aie-backend
    profiles:
      - ci
      - dev
      - prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库配置
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aie:aie_password@postgres:5432/aie}
      # Redis 配置
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # 应用配置
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      # API 配置
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      # 模型配置
      LLM_PROVIDER: ${LLM_PROVIDER:-litellm}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      API_KEY: ${API_KEY:-}
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./data:/app/data
      - ./memory:/app/memory
      - ./workspace:/app/workspace
      - ./skills:/app/skills
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "python -m pip install -r requirements.txt &&
             python backend/app.py --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - aie-network

  # ===========================================
  # 前端服务 (开发环境)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend.dev
    container_name: aie-frontend-dev
    profiles:
      - dev
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/chat}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - aie-network

  # ===========================================
  # CI 专用服务 - 运行测试
  # ===========================================
  ci-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.ci
    container_name: aie-ci-test
    profiles:
      - ci
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aie:aie_password@postgres:5432/aie
      REDIS_URL: redis://redis:6379
      TEST_MODE: "true"
      CI: "true"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ci_coverage:/app/coverage
    command: >
      sh -c "
        echo '🧪 运行 CI 测试...' &&

        echo '[1/5] 安装依赖...' &&
        pip install -r requirements.txt --quiet &&
        pip install pytest pytest-cov pytest-asyncio --quiet &&

        echo '[2/5] flake8 代码风格检查...' &&
        flake8 backend --config=.flake8 --statistics || true &&

        echo '[3/5] black 格式化检查...' &&
        black --check backend/ || true &&

        echo '[4/5] 运行单元测试...' &&
        pytest backend/tests/ --cov=backend --cov-report=xml:/app/coverage/coverage.xml --cov-report=html:/app/coverage/html -v || true &&

        echo '[5/5] 生成测试报告...' &&
        echo '✅ CI 测试完成!' &&
        ls -la /app/coverage/
      "
    networks:
      - aie-network

  # ===========================================
  # 生产环境 - 前端构建
  # ===========================================
  frontend-build:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
    container_name: aie-frontend-prod
    profiles:
      - prod
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - aie-network

  # ===========================================
  # Nginx 反向代理 (生产环境)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: aie-nginx
    profiles:
      - prod
    depends_on:
      - backend
      - frontend-build
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aie-network

# ===========================================
# 网络配置
# ===========================================
networks:
  aie-network:
    driver: bridge
    name: aie-network

# ===========================================
# 数据卷配置
# ===========================================
volumes:
  postgres_data:
    name: aie-postgres-data
  redis_data:
    name: aie-redis-data
  frontend_node_modules:
    name: aie-frontend-node-modules
  nginx_logs:
    name: aie-nginx-logs
  ci_coverage:
    name: aie-ci-coverage
