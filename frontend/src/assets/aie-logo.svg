<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <!-- Gradient for AI -->
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse animation -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes glow-pulse {
        0%, 100% { filter: url(#glow); }
        50% { filter: url(#glow) brightness(1.2); }
      }
      .ai-text {
        animation: float 3s ease-in-out infinite, glow-pulse 2s ease-in-out infinite;
        transform-origin: center;
      }
      .e-text {
        animation: float 3s ease-in-out infinite;
        animation-delay: 0.5s;
      }
      .brain-icon {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="url(#aiGradient)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="28;32;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Brain/AI icon -->
  <g class="brain-icon" transform="translate(22, 22)">
    <path d="M8 16 L8 8 Q8 4 12 4 L20 4 Q24 4 24 8 L24 16 Q24 20 20 20 L12 20 Q8 20 8 16 Z"
          fill="none" stroke="url(#aiGradient)" stroke-width="2"/>
    <circle cx="12" cy="12" r="2" fill="#00f0ff"/>
    <circle cx="18" cy="10" r="1.5" fill="#00f0ff"/>
    <circle cx="16" cy="15" r="1.5" fill="#00f0ff"/>
    <path d="M12 8 L12 14 M16 7 L16 12" stroke="url(#aiGradient)" stroke-width="1.5"/>
  </g>

  <!-- AI Text -->
  <text x="65" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" class="ai-text" fill="url(#aiGradient)">AI</text>

  <!-- E Text -->
  <text x="105" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" class="e-text" fill="#ffffff">E</text>

  <!-- Subtitle -->
  <text x="65" y="68" font-family="Arial, sans-serif" font-size="10" fill="#666">Enterprise</text>
</svg>
